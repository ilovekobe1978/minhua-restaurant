      { id: "38", name: "Le Siècle", nameEn: "Le Siecle", star: 0, typeText: "米其林入选餐厅", city: "南京", address: "中山东路311-1号", phone: "025-xxxx-xxxx", hours: "18:00-23:00", price: "人均 300-500元", image: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400", latitude: 32.0417, longitude: 118.8111, type: "时尚欧陆菜" },
      { id: "39", name: "万国春花园餐厅", nameEn: "Wan Guo Chun Garden", star: 0, typeText: "米其林入选餐厅", city: "南京", address: "江苏路3号颐和公馆", phone: "025-xxxx-xxxx", hours: "11:00-21:00", price: "人均 100-200元", image: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400", latitude: 32.0639, longitude: 118.775, type: "淮扬菜" },
      { id: "40", name: "素香园", nameEn: "Su Xiang Yuan", star: 0, typeText: "米其林入选餐厅", city: "南京", address: "广州路208号", phone: "025-xxxx-xxxx", hours: "11:00-21:00", price: "人均 80-150元", image: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400", latitude: 32.0528, longitude: 118.775, type: "素食" },
      { id: "41", name: "海九", nameEn: "Hai Jiu", star: 0, typeText: "米其林入选餐厅", city: "南京", address: "江东中路222号", phone: "025-xxxx-xxxx", hours: "11:00-21:00", price: "人均 200-400元", image: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400", latitude: 32.0105, longitude: 118.7294, type: "海鲜" }
    ];

    let map = null;
    let markers = [];

    function loadMap() {
      const key = 'd10226f4b41966edfce1f00ebeb183bc';
      const script = document.createElement('script');
      script.src = `https://webapi.amap.com/maps?v=2.0&key=${key}&plugin=AMap.Scale,AMap.ToolBar`;
      script.onload = initMap;
      document.head.appendChild(script);
    }

    function initMap() {
      map = new AMap.Map('map', {
        zoom: 12,
        center: new AMap.LngLat(118.78, 32.04)
      });
      map.addControl(new AMap.Scale());
      map.addControl(new AMap.ToolBar());
      addMarkers(restaurants);
      document.getElementById('stats').textContent = '42 家餐厅';

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          const type = this.dataset.type;
          const filtered = type === '全部' ? restaurants : restaurants.filter(r => r.typeText === type);
          addMarkers(filtered);
          document.getElementById('stats').textContent = filtered.length + ' 家餐厅';
        });
      });

      setTimeout(() => {
        document.getElementById('mapHint').style.display = 'none';
      }, 4000);
    }

    function createMarkerIcon(typeText) {
      let color = '#2196F3';
      let icon = '●';

      if (typeText === '米其林一星') {
        color = '#c9a96e';
        icon = '★';
      } else if (typeText === '必比登推介') {
        color = '#4CAF50';
        icon = '●';
      } else if (typeText === '米其林入选餐厅') {
        color = '#2196F3';
        icon = '◆';
      }

      return new AMap.Marker({
        icon: new AMap.DivIcon({
          html: `<div style="
            background: ${color};
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
          ">${icon}</div>`,
          size: [28, 28],
          anchor: 'center'
        }),
        position: [0, 0]
      });
    }

    function addMarkers(list) {
      if (markers.length > 0) {
        map.remove(markers);
        markers = [];
      }
      list.forEach(r => {
        const marker = new AMap.Marker({
          position: new AMap.LngLat(r.longitude, r.latitude),
          title: r.name
        });

        marker.on('click', function() {
          const infoWindow = new AMap.InfoWindow({
            content: createInfoContent(r),
            offset: new AMap.Pixel(0, -30)
          });
          infoWindow.open(map, marker.getPosition());
          setTimeout(() => {
            const addrEl = document.querySelector('.address-link');
            if (addrEl) {
              addrEl.addEventListener('click', function() {
                map.setZoomAndCenter(16, new AMap.LngLat(r.longitude, r.latitude));
              });
            }
          }, 100);
        });

        map.add(marker);
        markers.push(marker);
      });
    }

    function createInfoContent(r) {
      let badgeClass = 'badge-selected';
      if (r.typeText === '米其林一星') badgeClass = 'badge-star-1';
      else if (r.typeText === '必比登推介') badgeClass = 'badge-bibendum';

      return `<div class="info-window">
        <div class="info-window-header">
          <img src="${r.image}" alt="${r.name}">
        </div>
        <div class="info-window-body">
          <div class="info-window-title">${r.name}</div>
          <div class="info-window-subtitle">${r.nameEn}</div>
          <div class="info-window-badges">
            <span class="info-badge ${badgeClass}">${r.typeText}</span>
            <span class="info-badge badge-city">${r.city}</span>
            <span class="info-badge badge-type">${r.type}</span>
          </div>
          <div class="info-window-row"><strong>地址：</strong><span class="address-link">${r.address}</span></div>
          <div class="info-window-row"><strong>菜系：</strong>${r.type}</div>
          <div class="info-window-row"><strong>消费：</strong>${r.price}</div>
          <div class="info-window-actions">
            <a class="info-window-btn info-window-btn-secondary" href="tel:${r.phone}">📞 拨打</a>
            <a class="info-window-btn info-window-btn-primary" href="https://uri.amap.com/navigation?to=${r.longitude},${r.latitude},${r.name}&mode=car" target="_blank">🗺️ 导航</a>
          </div>
        </div>
      </div>`;
    }

    loadMap();
  </script>
</body>
</html>
